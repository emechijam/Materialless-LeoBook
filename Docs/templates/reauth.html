<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; background-color: #000000; color: #ffffff; font-family: 'Lexend', sans-serif; text-align: center; }
    .wrapper { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
    .logo { font-size: 28px; font-weight: 600; letter-spacing: 4px; margin-bottom: 50px; }
    .content { font-size: 16px; line-height: 1.6; margin-bottom: 40px; font-weight: 300; }
    .token-box { padding: 40px; background-color: #111111; color: #ffffff; font-size: 36px; font-weight: 600; letter-spacing: 12px; margin: 20px auto; width: fit-content; border: 1px solid #333333; }
    .footer { margin-top: 60px; font-size: 12px; color: #666666; border-top: 1px solid #222222; padding-top: 20px; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="logo">LOBOOK</div>
    <div class="content">
      <h2 style="font-weight: 400; margin-bottom: 20px;">Verification Required.</h2>
      <p>Use the code below to complete your reauthentication for LeoBook.</p>
    </div>
    <div class="token-box">{{ .Token }}</div>
    <div class="footer">
      <p>&copy; 2026 Materialless LLC. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
