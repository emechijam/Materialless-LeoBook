<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Your Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; background-color: #000000; color: #ffffff; font-family: 'Lexend', sans-serif; text-align: center; }
    .wrapper { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
    .logo { font-size: 28px; font-weight: 600; letter-spacing: 4px; margin-bottom: 50px; }
    .content { font-size: 16px; line-height: 1.6; margin-bottom: 40px; font-weight: 300; }
    .btn { display: inline-block; padding: 16px 40px; background-color: #ffffff; color: #000000; text-decoration: none; font-weight: 600; border-radius: 50px; font-size: 14px; letter-spacing: 1px; }
    .footer { margin-top: 60px; font-size: 12px; color: #666666; border-top: 1px solid #222222; padding-top: 20px; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="logo">LOBOOK</div>
    <div class="content">
      <h2 style="font-weight: 400; margin-bottom: 20px;">Forgot Password?</h2>
      <p>Securely reset your LeoBook password using the link below. Access your dashboard in seconds.</p>
    </div>
    <a href="{{ .ConfirmationURL }}" class="btn">RESET PASSWORD</a>
    <div class="footer">
      <p>&copy; 2026 Materialless LLC. All rights reserved.</p>
      <p>If you did not request a password reset, your account is still secure. No action is needed.</p>
    </div>
  </div>
</body>
</html>
